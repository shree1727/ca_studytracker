<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <link rel="stylesheet"
  href="../css/auth.css">
</head>
<body>

<div class="auth-container">

  <div class="auth-card">

    <h1>Login</h1>

    <form id="loginForm">

      <input
      type="email"
      id="loginEmail"
      placeholder="Enter Email"
      required>

      <input
      type="password"
      id="loginPassword"
      placeholder="Enter Password"
      required>

      <button type="submit">
      Login
      </button>

    </form>

    <p>
      Don't have account?
      <a href="./register.html">
        Register
      </a>
    </p>

  </div>

</div>

<script src="../js/auth.js"></script>

</body>
</html>
